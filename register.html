<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Create Student Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* Custom Styles */
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6f9;
            padding-top: 70px; /* Space for fixed navbar */
        }

        .navbar {
            background: #0d6efd;
        }

        .navbar-brand, .nav-link {
            color: #fff !important;
            font-weight: 500;
        }

        .form-card {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .navbar.fixed-top {
            z-index: 999;
        }

        .form-floating {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .form-floating label {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            pointer-events: none;
            transition: all 0.2s ease;
            color: #6c757d;
            font-size: 1rem;
        }

        .form-control {
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
        }

        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
        }

        .form-control:focus ~ label,
        .form-control:not(:placeholder-shown) ~ label {
            top: -10px;
            left: 12px;
            font-size: 1.2rem;
            color: #0d6efd;
        }

        .error-message {
            color: red;
            font-size: 14px;
        }

        .required::after {
            content: '*';
            color: red;
        }

        .password-strength {
            height: 6px;
            border-radius: 4px;
            margin-top: 5px;
            width: 0%;
        }

        .password-strength.weak {
            background-color: red;
        }

        .password-strength.medium {
            background-color: yellow;
        }

        .password-strength.strong {
            background-color: green;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">Felegeneway Academy</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Create Account</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- FORM -->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-9 col-lg-8">
                <div class="form-card">
                    <h4 class="text-center mb-4">Student Registration</h4>

                    <form id="studentForm" onsubmit="return validateForm()">
                        <div class="row">
                            <!-- Left Column -->
                            <div class="col-md-6">
                                <!-- First Name, Middle Name, Last Name -->
                                <div class="form-floating">
                                    <input type="text" id="firstName" class="form-control required" placeholder="First Name" oninput="this.value=this.value.replace(/[^A-Za-z]/g,'')" required>
                                    <label for="firstName">First Name</label>
                                </div>

                                <div class="form-floating">
                                    <input type="text" id="middleName" class="form-control required" placeholder="Middle Name" oninput="this.value=this.value.replace(/[^A-Za-z]/g,'')" required>
                                    <label for="middleName">Middle Name</label>
                                </div>

                                <div class="form-floating">
                                    <input type="text" id="lastName" class="form-control required" placeholder="Last Name" oninput="this.value=this.value.replace(/[^A-Za-z]/g,'')" required>
                                    <label for="lastName">Last Name</label>
                                </div>

                                <!-- Date of Birth -->
                                <div class="form-floating">
                                    <input type="date" id="dob" class="form-control required" onchange="calculateAge()" required>
                                    <label for="dob">Date of Birth</label>
                                </div>

                                <div class="form-floating">
                                    <input type="number" id="age" class="form-control" placeholder="Age" readonly>
                                    <label for="age">Age</label>
                                    <div id="ageError" class="error-message"></div>
                                </div>

                                <!-- Gender -->
                                <label>Gender</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="gender" id="genderMale" value="Male" required>
                                    <label class="form-check-label" for="genderMale">Male</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="gender" id="genderFemale" value="Female" required>
                                    <label class="form-check-label" for="genderFemale">Female</label>
                                </div>

                                <!-- Nationality -->
                                <div class="form-floating">
                                    <select id="nationality" class="form-control required" required>
                                        <option value="" disabled selected>Select Nationality</option>
                                        <option value="Ethiopian">Ethiopian</option>
                                        <option value="American">American</option>
                                        <option value="Canadian">Canadian</option>
                                        <option value="British">British</option>
                                        <option value="Other">Other</option>
                                    </select>
                                    <label for="nationality">Nationality</label>
                                </div>

                                <!-- Fayda Number -->
                                <div class="form-floating">
                                    <input type="text" id="faydaNumber" class="form-control" placeholder="Fayda Number" 
                                           pattern="^[0-9]{12}$" title="Fayda number should be exactly 12 digits" inputmode="numeric" oninput="validateFaydaNumber(this)" required>
                                    <label for="faydaNumber">Fayda Number</label>
                                </div>

                            </div>

                            <!-- Right Column -->
                            <div class="col-md-6">
                                <!-- Grade Dropdown -->
                                <div class="form-floating">
                                    <select id="grade" class="form-control required" required>
                                        <option value="" disabled selected>Select Grade</option>
                                        <option value="1">Grade 1</option>
                                        <option value="2">Grade 2</option>
                                        <option value="3">Grade 3</option>
                                        <option value="4">Grade 4</option>
                                        <option value="5">Grade 5</option>
                                        <option value="1">Grade 6</option>
                                        <option value="2">Grade 7</option>
                                        <option value="3">Grade 8</option>
                                        <option value="4">Grade 9</option>
                                        <option value="5">Grade 10</option>
                                        <option value="1">Grade 11</option>
                                        <option value="2">Grade 12</option>
                                        
                                    </select>
                                    <label for="grade">Grade</label>
                                </div>

                                <!-- Section Dropdown -->
                                <div class="form-floating">
                                    <select id="section" class="form-control required" required>
                                        <option value="" disabled selected>Select Section</option>
                                        <option value="A">Section A</option>
                                        <option value="B">Section B</option>
                                        <option value="C">Section C</option>
                                        <option value="D">Section D</option>
                                        <option value="E">Section E</option>
                                    </select>
                                    <label for="section">Section</label>
                                </div>

                                <!-- Previous School -->
                                <div class="form-floating">
                                    <input type="text" id="previousSchool" class="form-control required" placeholder="Previous School" required>
                                    <label for="previousSchool">Previous School</label>
                                </div>

                                <!-- Parent Phone Number -->
                                <div class="form-floating">
                                    <input type="tel" id="phone" class="form-control" placeholder="09XXXXXXXX"
                                           pattern="^[0-9]{9}$" title="Phone number should be 9 digits" inputmode="numeric" oninput="validatePhone(this)" required>
                                    <label for="phone">Parent Phone Number</label>
                                </div>

                                <!-- Email -->
                                <div class="form-floating">
                                    <input type="email" id="email" class="form-control required" placeholder="Email" required>
                                    <label for="email">Email</label>
                                </div>

                                <!-- Subcity, City, Woreda -->
                                <div class="form-floating">
                                    <input type="text" id="subcity" class="form-control required" placeholder="Subcity" required>
                                    <label for="subcity">Subcity</label>
                                </div>

                                <div class="form-floating">
                                    <input type="text" id="city" class="form-control required" placeholder="City" required>
                                    <label for="city">City</label>
                                </div>

                                <div class="form-floating">
                                    <input type="text" id="woreda" class="form-control required" placeholder="Woreda" required>
                                    <label for="woreda">Woreda</label>
                                </div>

                                <!-- Profile Picture -->
                                <div class="form-floating">
                                    <input type="file" id="profilePic" class="form-control" placeholder="Profile Picture" accept="image/*">
                                    <label for="profilePic">Profile Picture (Optional)</label>
                                </div>
                            </div>
                        </div>

                        <!-- Password and Confirm Password -->
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="password" id="password" class="form-control required" placeholder="Password" required onkeyup="checkPasswordStrength()">
                                    <label for="password">Password</label>
                                    <div class="password-strength" id="passwordStrength"></div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="password" id="confirmPassword" class="form-control required" placeholder="Confirm Password" required>
                                    <label for="confirmPassword">Confirm Password</label>
                                    <div id="passwordMatchError" class="error-message"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Terms and Conditions -->
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="termsCheck" required>
                            <label class="form-check-label" for="termsCheck">
                                I accept the <a href="#">Terms and Conditions</a>
                            </label>
                        </div>

                        <div class="text-center">
                            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#confirmationModal">
                                Submit
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div class="modal fade" id="confirmationModal" tabindex="-1" aria-labelledby="confirmationModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmationModalLabel">Confirm Submission</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Are you sure you want to submit the form?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary" onclick="submitForm()">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Password strength checker
        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('passwordStrength');

            let strength = 0;

            if (password.length >= 6) strength += 1;
            if (password.match(/[A-Z]/)) strength += 1;
            if (password.match(/[a-z]/)) strength += 1;
            if (password.match(/[0-9]/)) strength += 1;
            if (password.match(/[^A-Za-z0-9]/)) strength += 1;

            if (strength === 0) {
                strengthBar.style.width = '0%';
                strengthBar.className = 'password-strength';
            } else if (strength === 1) {
                strengthBar.style.width = '25%';
                strengthBar.className = 'password-strength weak';
            } else if (strength === 2) {
                strengthBar.style.width = '50%';
                strengthBar.className = 'password-strength medium';
            } else if (strength === 3) {
                strengthBar.style.width = '75%';
                strengthBar.className = 'password-strength medium';
            } else {
                strengthBar.style.width = '100%';
                strengthBar.className = 'password-strength strong';
            }
        }

        // Function to check if passwords match
        function validateForm() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const passwordMatchError = document.getElementById('passwordMatchError');

            if (password !== confirmPassword) {
                passwordMatchError.textContent = 'Passwords do not match!';
                passwordMatchError.style.color = 'red';
                return false;
            } else {
                passwordMatchError.textContent = '';
                return true;
            }
        }

        // Function for submitting the form after confirmation
        function submitForm() {
            if (validateForm()) {
                document.getElementById('studentForm').submit();
            } else {
                alert('Please correct the errors before submitting.');
            }
        }

        // Calculate age based on Date of Birth
        function calculateAge() {
            const dob = document.getElementById('dob').value;
            const dobDate = new Date(dob);
            const today = new Date();

            let age = today.getFullYear() - dobDate.getFullYear();
            const month = today.getMonth() - dobDate.getMonth();

            if (month < 0 || (month === 0 && today.getDate() < dobDate.getDate())) {
                age--;
            }

            // Age restriction: Not more than 150 years
            if (age > 150) {
                document.getElementById('age').value = '';
                document.getElementById('ageError').textContent = 'Age cannot be greater than 150 years!';
            } else {
                document.getElementById('age').value = age;
                document.getElementById('ageError').textContent = '';
            }
        }

        // Prevent non-numeric input for phone number
        function validatePhone(input) {
            input.value = input.value.replace(/[^0-9]/g, '');  // Replace non-numeric characters with an empty string
        }

        // Prevent non-numeric input for Fayda number
        function validateFaydaNumber(input) {
            input.value = input.value.replace(/[^0-9]/g, '');  // Replace non-numeric characters with an empty string
        }
    </script>
</body>

</html>
